name: Weekly Firmware Release

on:
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: weekly-firmware-release
  cancel-in-progress: false

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-platformio-${{ hashFiles('platformio.ini') }}

      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Regenerate config
        run: python generate_config.py --output data/config.json

      - name: Detect generated config changes
        id: config_changes
        shell: bash
        run: |
          if git diff --quiet -- data/config.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit generated config
        if: steps.config_changes.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/config.json
          git commit -m "chore: refresh generated config"
          git push

      - name: Capture release metadata
        id: release_meta
        shell: bash
        run: |
          release_tag="weekly-$(date -u +%Y%m%d-%H%M)-${GITHUB_RUN_NUMBER}"
          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "published_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build firmware image
        run: python -m platformio run

      - name: Build SPIFFS image
        run: python -m platformio run -t buildfs

      - name: Generate PlatformIO IDE metadata
        run: python -m platformio run -t idedata

      - name: Verify packaging inputs
        shell: bash
        run: |
          expected=(
            .pio/build/m5stack-sticks3/bootloader.bin
            .pio/build/m5stack-sticks3/partitions.bin
            .pio/build/m5stack-sticks3/idedata.json
            .pio/build/m5stack-sticks3/firmware.bin
            .pio/build/m5stack-sticks3/spiffs.bin
          )

          missing=()
          for path in "${expected[@]}"; do
            if [[ ! -f "$path" ]]; then
              missing+=("$path")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing expected build outputs before packaging:\n'
            printf '  %s\n' "${missing[@]}"
            python -m platformio run
            python -m platformio run -t buildfs
            python -m platformio run -t idedata
          fi

          for path in "${expected[@]}"; do
            if [[ ! -f "$path" ]]; then
              echo "Required build artifact still missing: $path" >&2
              exit 1
            fi
          done

          python - <<'PY'
          import json
          from pathlib import Path

          idedata_path = Path('.pio/build/m5stack-sticks3/idedata.json')
          idedata = json.loads(idedata_path.read_text(encoding='utf-8'))
          flash_images = {
            Path(image['path']).name: Path(image['path'])
            for image in idedata.get('extra', {}).get('flash_images', [])
          }

          required = ('bootloader.bin', 'partitions.bin', 'boot_app0.bin')
          missing = [name for name in required if name not in flash_images]
          if missing:
            raise SystemExit(f"Missing required recovery images in idedata.json: {', '.join(missing)}")

          for name in required:
            path = flash_images[name]
            if not path.is_file():
              raise SystemExit(f"Required recovery image is missing on disk: {path}")
          PY

      - name: Package release and Pages assets
        run: |
          python scripts/package_release.py \
            --repo "${GITHUB_REPOSITORY}" \
            --tag "${{ steps.release_meta.outputs.tag }}" \
            --published-at "${{ steps.release_meta.outputs.published_at }}" \
            --commit-sha "${{ steps.release_meta.outputs.commit_sha }}" \
            --config-changed "${{ steps.config_changes.outputs.changed }}" \
            --config data/config.json \
            --build-dir .pio/build/m5stack-sticks3 \
            --partition-csv "$HOME/.platformio/packages/framework-arduinoespressif32/tools/partitions/default_8MB.csv" \
            --release-dir dist/release \
            --site-dir docs \
            --pages-dir dist/pages

      - name: Upload release bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: spectacle-release-${{ steps.release_meta.outputs.tag }}
          path: dist/release

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          target_commitish: ${{ steps.release_meta.outputs.commit_sha }}
          name: Spectacle ${{ steps.release_meta.outputs.tag }}
          files: dist/release/*
          body: |
            Routine update release for the Spectacle smart-glasses detector.

            - Config regenerated from the Nordic BLE company database: ${{ steps.config_changes.outputs.changed }}
            - Application image offset: 0x10000
            - SPIFFS image offset: 0x670000
            - Recovery bundle includes boot metadata at 0xE000

            Use the GitHub Pages updater for routine updates. Full erase is reserved for recovery because it also clears the bootloader and partition table.

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/pages

  deploy-pages:
    needs: build-release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy Pages site
        id: deploy
        uses: actions/deploy-pages@v4